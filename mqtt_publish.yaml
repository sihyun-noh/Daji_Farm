script:
  mqtt_external_broker_test_publish:
    alias: MQTT External Broker Test Publish
    mode: single
    sequence:
      - service: mqtt.publish
        data:
          topic: "/HA01/DAJIFARM/test"
          payload: >
            {
              "site_id": "site01",
              "source": "homeassistant",
              "message": "mqtt publish test",
              "published_at": "{{ now().isoformat() }}"
            }
          qos: 2
          retain: false

  smartfarm_mqtt_publish_current_data:
    alias: Smart Farm MQTT Publish Current Data
    mode: single
    sequence:
      - service: mqtt.publish
        data:
          topic: "/HA01/DAJIFARM"
          payload: >
            {
              "site_id": "site01",
              "source": "homeassistant",
              "published_at": "{{ now().isoformat() }}",
              "air_temperature": {{ states("sensor.representative_air_temperature") | float(none) | to_json }},
              "air_humidity": {{ states("sensor.representative_air_humidity") | float(none) | to_json }},
              "soil_temperature": {{ states("sensor.kc868_a8s_soil_temperature") | float(none) | to_json }},
              "soil_moisture": {{ states("sensor.kc868_a8s_soil_moisture") | float(none) | to_json }},
              "soil_ec": {{ states("sensor.kc868_a8s_soil_ec") | float(none) | to_json }},
              "pump_state": {{ states("switch.kc868_a8s_a8s_out_5") | to_json }},
              "pump_timer_remaining": {{ states("sensor.pump_timer_remaining") | to_json }},
              "pump_runtime_today_hours": {{ states("sensor.pump_runtime_today") | float(none) | to_json }},
              "pump_runtime_today_minutes": {{ ((states("sensor.pump_runtime_today") | float(0)) * 60) | round(0) | int }},
              "remote_state": {{ states("switch.kc868_a8s_a8s_out_6") | to_json }},
              "fan_state": {{ states("switch.kc868_a8s_a8s_out_7") | to_json }},
              "light_state": {{ states("switch.kc868_a8s_a8s_out_8") | to_json }}
            }
          qos: 2
          retain: false
      - service: persistent_notification.create
        data:
          title: "Smart Farm MQTT"
          message: "현재 스마트팜 데이터를 외부 MQTT 브로커로 전송했습니다."