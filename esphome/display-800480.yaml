esphome:
  name: sunton-esp32-8048s070
  friendly_name: "Sunton ESP32 800x480 7 inch"
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: y

psram:
  mode: octal
  speed: 80MHz

# Enable logging

logger:

# Enable Home Assistant API
api:
  encryption:
    key: "/JoZTqox53bVIbtDjq8+PN+aNpb4HtY52qnoNpG8FKM="

ota:
  - platform: esphome
    password: "eff974029d8ba930c13fd42339e6c109"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Display-800480 Fallback Hotspot"
    password: "gnWtTzmL1loy"

captive_portal:

i2c:
  - id: bus_a
    scl: GPIO20
    sda: GPIO19
    scan: true

output:
  - platform: ledc
    pin: GPIO2
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

display:
  - id: my_display
    platform: rpi_dpi_rgb
    dimensions:
      width: 800
      height: 480
    color_order: RGB
    invert_colors: true
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 42
    pclk_frequency: 12MHz
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  platform: gt911
  id: main_touchscreen
  address: 0x5D
  update_interval: 16ms
  transform:
    mirror_x: true
    swap_xy: true
  on_touch:
    then:
      - script.execute: inactivity_timer

font:
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48
  - file: "gfonts://Roboto"
    id: roboto_28
    size: 28

lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: main_touchscreen
  buffer_size: 25%
  default_font: roboto_28
  pages:
    - id: main_page
      bg_color: 0x202020
      widgets:
        - label:
            align: TOP_MID
            y: 40
            text: "Sunton ESP32-8048S070"
            text_color: 0xFFFFFF
            text_font: roboto_28

        - label:
            align: CENTER
            text: "Hello LVGL"
            text_color: 0x00FFAA
            text_font: roboto_48

        - button:
            id: test_button
            align: BOTTOM_MID
            y: -40
            width: 220
            height: 70
            widgets:
              - label:
                  align: CENTER
                  text: "Touch me"
                  text_color: 0xFFFFFF
            on_press:
              then:
                - light.toggle: back_light

script:
  - id: inactivity_timer
    mode: restart
    then:
      - if:
          condition:
            light.is_off: back_light
          then:
            - light.turn_on:
                id: back_light
      - delay: !lambda 'return id(sleep_time).state * 1000;'
      - light.turn_off:
          id: back_light

number:
  - platform: template
    name: "Sleep time"
    id: sleep_time
    optimistic: true
    initial_value: 15
    restore_value: true
    unit_of_measurement: "s"
    device_class: duration
    mode: box
    min_value: 5
    max_value: 600
    step: 1