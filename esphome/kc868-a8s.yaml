esphome:
  name: kc868-a8s
  friendly_name: KC868-A8S

esp32:
  board: esp32dev
  framework:
    type: arduino


# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "SmeMkFJgR+WP+UVfExt3jlxVZNzo4MvMF02gYBSX0c8="

ota:
  - platform: esphome
    password: "605de2560955280a812619ff26430d68"

# Example configuration entry
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    mode: CLK_OUT
    pin: 17
  phy_addr: 0

#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
#  ap:
#    ssid: "Kc868-A8S Fallback Hotspot"
#    password: "idrNQdXYs07Y"

#captive_portal:


# Example configuration entry for ESP32
i2c:
  sda: 4
  scl: 5
  scan: true
  id: bus_a

# Example configuration entry
pcf8574:
  - id: 'pcf8574_hub_out_1'  # for output channel 1-8
    address: 0x24

  - id: 'pcf8574_hub_in_1'  # for input channel 1-8
    address: 0x22


uart:
  id: mod_bus
  tx_pin: 33
  rx_pin: 32
  baud_rate: 4800
  stop_bits: 1
  parity: NONE

modbus:
  id: modbus1
  uart_id: mod_bus

modbus_controller:
  - id: kc868_a8s_soil_1
    address: 0x03
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 1000ms

  - id: kc868_a8s_autonics
    address: 0x02
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 500ms

  - id: kc868_a8s_cwt
    address: 0x01
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 500ms

# MPU6050 accelerometer/gyroscope sensor 
sensor:
  - platform: mpu6050
    address: 0x68

    accel_x:
      id: accel_x
      name: "MPU6050 Accel X"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    accel_y:
      id: accel_y
      name: "MPU6050 Accel Y"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    accel_z:
      id: accel_z
      name: "MPU6050 Accel z"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    gyro_x:
      name: "MPU6050 Gyro X"
      id: gyro_x
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    gyro_y:
      name: "MPU6050 Gyro Y"
      id: gyro_y
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    gyro_z:
      name: "MPU6050 Gyro z"
      id: gyro_z
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    temperature:
      name: "MPU6050 Temperature"
      filters:
       - sliding_window_moving_average:
          window_size: 10
          send_every: 5

    update_interval: 250ms

  - platform: template
    id: roll
    name: roll
    accuracy_decimals: 2
    lambda: |-
      return  (atan( id(accel_y).state / sqrt( pow( id(accel_x).state , 2) + pow( id(accel_z).state , 2) ) ) * 180 / PI) ;
    update_interval: 250ms

  - platform: template
    id: pitch
    name: pitch
    accuracy_decimals: 2
    lambda: |-
      return  (atan(-1 * id(accel_x).state / sqrt(pow(id(accel_y).state, 2) + pow(id(accel_z).state, 2))) * 180 / PI);
    update_interval: 250ms
    
# modebus 485
  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_soil_1
    name: "soil_Temperature"
    id: modbus_renke_03_T
    register_type: holding
    address: 0x0001
    unit_of_measurement: "°C"
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_soil_1
    name: "soil_Moisture"
    id: modbus_renke_02_M
    register_type: holding
    address: 0x0002
    unit_of_measurement: "%"
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_soil_1
    name: "soil_EC"
    id: modbus_renke_02_EC
    register_type: holding
    address: 0x0003
    unit_of_measurement: "us/cm"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_autonics
    name: "autonics_temperature"
    id: modbus_autonics_T
    register_type: read
    address: 0x0000
    unit_of_measurement: "°C"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_autonics
    name: "autonics_Humidity"
    id: modbus_autonics_H
    register_type: read
    address: 0x0001
    unit_of_measurement: "%"
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_cwt
    name: "cwt_Humidity"
    id: modbus_cwt_H
    register_type: holding
    address: 0x0000
    unit_of_measurement: "%"
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: kc868_a8s_cwt
    name: "cwt_temperature"
    id: modbus_cwt_T
    register_type: holding
    address: 0x0001
    unit_of_measurement: "°C"
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

# Individual outputs
switch:
  - platform: gpio
    name: "a8s_out_1"
    id: output_relay_1
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 0
      mode: OUTPUT
      inverted: true
    interlock: &interlock_group_1 [output_relay_1, output_relay_2]

  - platform: gpio
    name: "a8s_out_2"
    id: output_relay_2
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 1
      mode: OUTPUT
      inverted: true
    interlock: *interlock_group_1
      
  - platform: gpio
    name: "a8s_out_3"
    id: output_relay_3
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 2
      mode: OUTPUT
      inverted: true
    interlock: &interlock_group_2 [output_relay_3, output_relay_4]
      
  - platform: gpio
    name: "a8s_out_4"
    id: output_relay_4
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 3
      mode: OUTPUT
      inverted: true
    interlock: *interlock_group_2
      
  - platform: gpio
    name: "a8s_out_5"
    id: output_relay_5
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 4
      mode: OUTPUT
      inverted: true
    
      
  - platform: gpio
    name: "a8s_out_6"
    id: output_relay_6
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 5
      mode: OUTPUT
      inverted: true

      
  - platform: gpio
    name: "a8s_out_7"
    id: output_relay_7
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 6
      mode: OUTPUT
      inverted: true
    

      
  - platform: gpio
    name: "a8s_out_8"
    id: output_relay_8
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 7
      mode: OUTPUT
      inverted: true
    